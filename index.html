<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Labyrinth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0a0a0c;
  --surface:   #111116;
  --border:    #2a2a35;
  --accent:    #c8ff00;
  --accent2:   #ff4040;
  --text:      #e8e8e0;
  --muted:     #666670;
  --start:     #22c55e;
  --goal:      #3b82f6;
  --zone:      #dc2626;
  --player:    #facc15;
  --wall:      #1c1c24;
  --free:      #0f0f14;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
}

/* ── SCREENS ── */
.screen {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
}
.screen.active { display: flex; }

/* ── MENU ── */
.menu-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.4rem;
  width: min(480px, 92vw);
  animation: fadeUp 0.5s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4rem, 12vw, 7rem);
  letter-spacing: 0.12em;
  color: var(--accent);
  line-height: 1;
  text-shadow: 0 0 40px rgba(200,255,0,0.25);
}

.subtitle {
  font-size: 0.82rem;
  color: var(--muted);
  text-align: center;
  letter-spacing: 0.06em;
  margin-top: -0.8rem;
}

/* ── SETTINGS ── */
.settings {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 1.2rem 1.4rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.setting-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  align-items: center;
  gap: 12px;
}

.setting-row label {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.setting-row label small {
  font-size: 0.68rem;
  opacity: 0.6;
}

.setting-row input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 140px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}

.setting-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  transition: transform 0.15s;
}

.setting-row input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.25);
}

.val {
  font-size: 0.82rem;
  color: var(--accent);
  min-width: 32px;
  text-align: right;
}

/* ── LEGEND ── */
.legend-box {
  display: flex;
  gap: 1.4rem;
  font-size: 0.75rem;
  color: var(--muted);
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
}

.swatch {
  width: 12px;
  height: 12px;
  border-radius: 2px;
  display: inline-block;
}
.swatch.start  { background: var(--start); }
.swatch.goal   { background: var(--goal); }
.swatch.zone   { background: var(--zone); }
.swatch.player { background: var(--player); }

/* ── BUTTONS ── */
.btn-primary {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  padding: 0.7rem 2.8rem;
  background: var(--accent);
  color: #0a0a0c;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
.btn-primary:hover  { opacity: 0.88; }
.btn-primary:active { transform: scale(0.97); }

.btn-secondary {
  font-family: 'Share Tech Mono', monospace;
  font-size: 0.8rem;
  letter-spacing: 0.08em;
  padding: 0.5rem 1.6rem;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}
.btn-secondary:hover { color: var(--text); border-color: var(--text); }

.controls-hint {
  font-size: 0.72rem;
  color: var(--muted);
}

kbd {
  display: inline-block;
  padding: 1px 6px;
  font-family: inherit;
  font-size: 0.72rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 3px;
  margin: 0 2px;
}

/* ── HUD ── */
#screen-game {
  flex-direction: column;
  justify-content: flex-start;
  padding: 0;
}

.hud {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  padding: 0.5rem 1.2rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.hud-item { display: flex; flex-direction: column; gap: 1px; }
.hud-center { align-items: center; }
.hud-right  { align-items: flex-end; }

.hud-label {
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}

.hud-value {
  font-size: 1rem;
  color: var(--accent);
}

.hud-status {
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.06em;
  transition: color 0.3s;
}

.hud-status.danger { color: var(--accent2); animation: pulse 0.6s infinite alternate; }

@keyframes pulse {
  from { opacity: 1; }
  to   { opacity: 0.4; }
}

/* ── MAZE ── */
#maze-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 8px;
}

#maze-canvas {
  display: block;
  image-rendering: pixelated;
}

/* ── END SCREEN ── */
.end-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.2rem;
  animation: fadeUp 0.4s ease both;
}

.end-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 8vw, 4.5rem);
  letter-spacing: 0.1em;
}
.end-title.win  { color: var(--accent); }
.end-title.lose { color: var(--accent2); }

.end-msg {
  font-size: 0.82rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.end-stats {
  display: flex;
  gap: 2.5rem;
  margin: 0.4rem 0;
}

.stat {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.stat-label {
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.1em;
}
.stat-val {
  font-size: 1.6rem;
  color: var(--text);
}

/* ── OVERLAY FLASH ── */
#flash-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
}
#flash-overlay.red  { background: rgba(220,38,38,0.35); opacity: 1; }
#flash-overlay.green{ background: rgba(34,197,94,0.3);  opacity: 1; }
  </style>
</head>
<body>

  <!-- MENU SCREEN -->
  <div id="screen-menu" class="screen active">
    <div class="menu-inner">
      <h1 class="title">LABYRINTH</h1>
      <p class="subtitle">Erreiche das Ziel — bevor die Zone dich verschluckt.</p>

      <div class="settings">
        <div class="setting-row">
          <label for="cfg-size">Größe</label>
          <input type="range" id="cfg-size" min="11" max="51" step="2" value="25" />
          <span id="cfg-size-val" class="val">25</span>
        </div>
        <div class="setting-row">
          <label for="cfg-diff">Schwierigkeit</label>
          <input type="range" id="cfg-diff" min="1" max="20" step="1" value="10" />
          <span id="cfg-diff-val" class="val">10</span>
        </div>
        <div class="setting-row">
          <label for="cfg-speed">Zonengeschwindigkeit <small>(ms)</small></label>
          <input type="range" id="cfg-speed" min="50" max="800" step="50" value="250" />
          <span id="cfg-speed-val" class="val">250</span>
        </div>
        <div class="setting-row">
          <label for="cfg-delay">Startverzögerung <small>(s)</small></label>
          <input type="range" id="cfg-delay" min="1" max="15" step="1" value="4" />
          <span id="cfg-delay-val" class="val">4</span>
        </div>
      </div>

      <div class="legend-box">
        <div class="legend-item"><span class="swatch start"></span>Start</div>
        <div class="legend-item"><span class="swatch goal"></span>Ziel</div>
        <div class="legend-item"><span class="swatch zone"></span>Zone</div>
        <div class="legend-item"><span class="swatch player"></span>Spieler</div>
      </div>

      <button id="btn-start" class="btn-primary">SPIEL STARTEN</button>
      <p class="controls-hint">Steuerung: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> oder Pfeiltasten</p>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="screen-game" class="screen">
    <div class="hud">
      <div class="hud-item">
        <span class="hud-label">ZONE IN</span>
        <span id="hud-countdown" class="hud-value">--</span>
      </div>
      <div class="hud-item hud-center">
        <span id="hud-status" class="hud-status"></span>
      </div>
      <div class="hud-item hud-right">
        <span class="hud-label">SCHRITTE</span>
        <span id="hud-steps" class="hud-value">0</span>
      </div>
    </div>
    <div id="maze-container">
      <canvas id="maze-canvas"></canvas>
    </div>
  </div>

  <!-- END SCREEN -->
  <div id="screen-end" class="screen">
    <div class="end-inner">
      <h2 id="end-title" class="end-title"></h2>
      <p id="end-msg" class="end-msg"></p>
      <div class="end-stats">
        <div class="stat"><span class="stat-label">Schritte</span><span id="stat-steps" class="stat-val">0</span></div>
        <div class="stat"><span class="stat-label">Zeit</span><span id="stat-time" class="stat-val">0s</span></div>
      </div>
      <button id="btn-retry" class="btn-primary">NOCHMAL</button>
      <button id="btn-menu" class="btn-secondary">MENÜ</button>
    </div>
  </div>

  <script>
'use strict';

// ── CONFIG ────────────────────────────────────────────────────────────────
let CFG = {
  size:        25,
  difficulty:  10,
  zoneSpeedMs: 250,
  zoneDelayS:  4,
};

// ── FARBEN ────────────────────────────────────────────────────────────────
const COLOR = {
  wall:   '#1c1c24',
  free:   '#0f0f14',
  start:  '#22c55e',
  goal:   '#3b82f6',
  zone:   '#7f1d1d',
  player: '#facc15',
};

// ── STATE ─────────────────────────────────────────────────────────────────
let lab, rows, cols, cellSize;
let playerGrid;
let goalPos;
let zone, frontier;
let steps, startTime;
let zoneActive, zoneStartTime, lastZoneExpand;
let animFrame;
let gameRunning = false;

const keysHeld = new Set();
let lastMoveTime = 0;
const MOVE_REPEAT_MS = 40;

// ── DOM ───────────────────────────────────────────────────────────────────
const screens = {
  menu: document.getElementById('screen-menu'),
  game: document.getElementById('screen-game'),
  end:  document.getElementById('screen-end'),
};
const canvas       = document.getElementById('maze-canvas');
const ctx          = canvas.getContext('2d');
const hudCountdown = document.getElementById('hud-countdown');
const hudSteps     = document.getElementById('hud-steps');
const hudStatus    = document.getElementById('hud-status');
const endTitle     = document.getElementById('end-title');
const endMsg       = document.getElementById('end-msg');
const statSteps    = document.getElementById('stat-steps');
const statTime     = document.getElementById('stat-time');

const flash = document.createElement('div');
flash.id = 'flash-overlay';
document.body.appendChild(flash);

// ── MENU ──────────────────────────────────────────────────────────────────
function bindSlider(id, valId, cfgKey) {
  const el = document.getElementById(id);
  const vl = document.getElementById(valId);
  el.addEventListener('input', () => { CFG[cfgKey] = parseInt(el.value); vl.textContent = el.value; });
}
bindSlider('cfg-size',  'cfg-size-val',  'size');
bindSlider('cfg-diff',  'cfg-diff-val',  'difficulty');
bindSlider('cfg-speed', 'cfg-speed-val', 'zoneSpeedMs');
bindSlider('cfg-delay', 'cfg-delay-val', 'zoneDelayS');
document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-retry').addEventListener('click', startGame);
document.getElementById('btn-menu').addEventListener('click', () => showScreen('menu'));

function showScreen(name) {
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
}

// ── MAZE GENERATOR ────────────────────────────────────────────────────────
function generateMaze(size, difficulty) {
  if (size % 2 === 0) size++;
  if (size < 5) size = 5;
  difficulty = Math.max(1, Math.min(20, difficulty));
  const r = size, c = size;
  const maze = Array.from({ length: r }, () => new Array(c).fill(1));
  function carve(row, col) {
    maze[row][col] = 0;
    const dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
    for (const [dr, dc] of dirs) {
      const nr = row+dr, nc = col+dc;
      if (nr>0 && nr<r-1 && nc>0 && nc<c-1 && maze[nr][nc]===1) {
        maze[row+dr/2][col+dc/2] = 0;
        carve(nr, nc);
      }
    }
  }
  carve(1, 1);
  const extra = Math.round(((21-difficulty)/20)*r*c*0.05);
  for (let i = 0; i < extra; i++) {
    const rr = 1+Math.floor(Math.random()*(r-2));
    const cc = 1+Math.floor(Math.random()*(c-2));
    if (maze[rr][cc] !== 1) continue;
    let free = 0;
    for (const [dr,dc] of [[0,1],[0,-1],[1,0],[-1,0]])
      if (maze[rr+dr]?.[cc+dc] === 0) free++;
    if (free >= 2) maze[rr][cc] = 0;
  }
  maze[1][1] = 2;
  maze[r-2][c-2] = 3;
  return maze;
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function cellKey(r, c) { return r * 10000 + c; }

function findCell(val) {
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (lab[r][c] === val) return { r, c };
  throw new Error('Nicht gefunden: ' + val);
}

function triggerFlash(cls) {
  flash.className = cls;
  setTimeout(() => { flash.className = ''; }, 350);
}

// Hintergrundzelle malen (ohne Spieler)
function paintCell(c, r) {
  if (zone.has(cellKey(r, c))) {
    ctx.fillStyle = COLOR.zone;
  } else {
    const v = lab[r][c];
    ctx.fillStyle = v===1 ? COLOR.wall : v===2 ? COLOR.start : v===3 ? COLOR.goal : COLOR.free;
  }
  ctx.fillRect(c*cellSize, r*cellSize, cellSize, cellSize);
}

// Spieler als einzelnes sauberes Quadrat zeichnen
function drawPlayer() {
  ctx.fillStyle = COLOR.player;
  ctx.fillRect(playerGrid.c*cellSize, playerGrid.r*cellSize, cellSize, cellSize);
}

// ── START ─────────────────────────────────────────────────────────────────
function startGame() {
  cancelAnimationFrame(animFrame);
  gameRunning = false;
  keysHeld.clear();

  lab  = generateMaze(CFG.size, CFG.difficulty);
  rows = lab.length;
  cols = lab[0].length;

  const maxW = window.innerWidth - 16;
  const maxH = window.innerHeight - 60;
  cellSize = Math.max(4, Math.floor(Math.min(maxW/cols, maxH/rows)));
  canvas.width  = cols * cellSize;
  canvas.height = rows * cellSize;

  playerGrid = findCell(2);
  goalPos    = findCell(3);

  zone = new Set();
  zone.add(cellKey(playerGrid.r, playerGrid.c));
  frontier = [{ r: playerGrid.r, c: playerGrid.c }];

  steps = 0; startTime = Date.now();
  zoneActive     = false;
  zoneStartTime  = Date.now() + CFG.zoneDelayS * 1000;
  lastZoneExpand = zoneStartTime;

  hudSteps.textContent = '0';
  hudStatus.textContent = '';
  hudStatus.classList.remove('danger');

  renderFull();
  showScreen('game');
  gameRunning  = true;
  lastMoveTime = 0;
  animFrame = requestAnimationFrame(gameLoop);
}

// ── INPUT ─────────────────────────────────────────────────────────────────
const KEY_DIR = {
  ArrowUp:[0,-1], KeyW:[0,-1],
  ArrowDown:[0,1], KeyS:[0,1],
  ArrowLeft:[-1,0], KeyA:[-1,0],
  ArrowRight:[1,0], KeyD:[1,0],
};

document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (KEY_DIR[e.code]) { e.preventDefault(); keysHeld.add(e.code); }
});
document.addEventListener('keyup', e => keysHeld.delete(e.code));

let touchStart = null;
document.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
document.addEventListener('touchend', e => {
  if (!gameRunning || !touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.clientX;
  const dy = e.changedTouches[0].clientY - touchStart.clientY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) tryMove(dx > 0 ? 1 : -1, 0);
  else                              tryMove(0, dy > 0 ? 1 : -1);
  touchStart = null;
}, { passive: true });

function tryMove(dx, dy) {
  const nr = playerGrid.r + dy;
  const nc = playerGrid.c + dx;
  if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) return;
  if (lab[nr][nc] === 1) return;

  // Alte Position zurückmalen, dann Spieler bewegen
  const prev = { ...playerGrid };
  playerGrid = { r: nr, c: nc };
  steps++;
  hudSteps.textContent = steps;

  paintCell(prev.c, prev.r);
  drawPlayer();

  lastMoveTime = Date.now();
  checkCell();
}

// ── GAME LOOP ─────────────────────────────────────────────────────────────
function gameLoop() {
  if (!gameRunning) return;

  const now = Date.now();

  // HUD Countdown
  if (!zoneActive) {
    const rem = Math.ceil((zoneStartTime - now) / 1000);
    hudCountdown.textContent = rem > 0 ? rem + 's' : '0s';
    if (rem <= 2) { hudStatus.textContent = 'ZONE KOMMT'; hudStatus.classList.add('danger'); }
    if (now >= zoneStartTime) { zoneActive = true; hudCountdown.textContent = 'AKTIV'; }
  } else {
    hudCountdown.textContent = 'AKTIV';
  }

  // Zone ausbreiten
  if (zoneActive && frontier.length > 0 && (now - lastZoneExpand) >= CFG.zoneSpeedMs) {
    lastZoneExpand = now;
    expandZone();
    if (!gameRunning) return;
  }

  // Taste gehalten
  if (keysHeld.size > 0 && (now - lastMoveTime) >= MOVE_REPEAT_MS) {
    for (const code of keysHeld) {
      const dir = KEY_DIR[code];
      if (dir) { tryMove(dir[0], dir[1]); break; }
    }
  }

  animFrame = requestAnimationFrame(gameLoop);
}

function checkCell() {
  const { r, c } = playerGrid;
  if (r === goalPos.r && c === goalPos.c) {
    triggerFlash('green');
    gameRunning = false;
    setTimeout(() => endGame(true), 150);
    return;
  }
  if (zone.has(cellKey(r, c))) {
    triggerFlash('red');
    gameRunning = false;
    setTimeout(() => endGame(false), 200);
  }
}

// ── ZONE ──────────────────────────────────────────────────────────────────
function expandZone() {
  const next = [];
  for (const { r, c } of frontier) {
    for (const [dr, dc] of [[0,1],[0,-1],[1,0],[-1,0]]) {
      const nr = r+dr, nc = c+dc;
      if (nr<0||nr>=rows||nc<0||nc>=cols) continue;
      if (lab[nr][nc] === 1) continue;
      const k = cellKey(nr, nc);
      if (zone.has(k)) continue;
      zone.add(k);
      next.push({ r: nr, c: nc });

      if (nr === playerGrid.r && nc === playerGrid.c) {
        ctx.fillStyle = COLOR.zone;
        ctx.fillRect(nc*cellSize, nr*cellSize, cellSize, cellSize);
        triggerFlash('red');
        gameRunning = false;
        setTimeout(() => endGame(false), 200);
        return;
      }

      if (lab[nr][nc] !== 3) {
        ctx.fillStyle = COLOR.zone;
        ctx.fillRect(nc*cellSize, nr*cellSize, cellSize, cellSize);
      }
    }
  }
  // Spieler nach Zone-Update neu zeichnen (Zone könnte ihn überdeckt haben)
  drawPlayer();
  frontier = next;
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderFull() {
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      paintCell(c, r);
  drawPlayer();
}

// ── END ───────────────────────────────────────────────────────────────────
function endGame(won) {
  cancelAnimationFrame(animFrame);
  keysHeld.clear();
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  endTitle.textContent  = won ? 'GESCHAFFT' : 'ERWISCHT';
  endTitle.className    = 'end-title ' + (won ? 'win' : 'lose');
  endMsg.textContent    = won ? 'Du hast das Labyrinth bezwungen!' : 'Die Zone hat dich verschluckt.';
  statSteps.textContent = steps;
  statTime.textContent  = elapsed + 's';
  setTimeout(() => showScreen('end'), 300);
}
</script>
</body>
</html>
